<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>StrangerChat · Chat Random</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0d1117; --surface:#161b22; --surface-elevated:#21262d;
      --border:#30363d; --accent:#58a6ff; --text:#c9d1d9;
      --text-muted:#8b949e; --radius:12px; --radius-lg:16px;
      --shadow:0 8px 24px rgba(0,0,0,0.4);
    }
    body {
      font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);
      display:flex; flex-direction:column; min-height:100vh;
    }
    .header {
      border-bottom:1px solid var(--border); padding:0 1.5rem; background:var(--surface);
    }
    .header-inner {
      max-width:900px; margin:0 auto; display:flex; align-items:center;
      justify-content:space-between; height:56px;
    }
    .logo { font-size:1.3rem; font-weight:600; color:#fff; display:flex; align-items:center; gap:0.5rem; }
    .logo-dot { width:8px; height:8px; background:var(--accent); border-radius:50%; }
    .nav-links { display:flex; gap:1.5rem; list-style:none; font-size:0.9rem; color:var(--text-muted); }
    .nav-links a { text-decoration:none; color:inherit; transition:0.2s; }
    .nav-links a:hover { color:#fff; }
    .container {
      flex:1; max-width:800px; width:100%; margin:0 auto; padding:2rem 1.5rem;
      display:flex; flex-direction:column;
    }
    .ad-slot {
      background:var(--surface); border:1px dashed var(--border);
      border-radius:var(--radius); color:var(--text-muted); text-align:center;
      padding:0.8rem; font-size:0.75rem; margin-bottom:1.5rem;
    }
    .chat-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-lg); box-shadow:var(--shadow);
      display:flex; flex-direction:column; height:500px; max-height:70vh; overflow:hidden;
    }
    .connect-screen {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:3rem 2rem; flex:1;
    }
    .connect-screen h2 { font-size:1.5rem; font-weight:500; margin-bottom:0.5rem; color:#fff; }
    .connect-screen p { color:var(--text-muted); margin-bottom:2rem; font-size:0.95rem; max-width:300px; }
    .btn-connect {
      background:var(--accent); color:#fff; border:none; padding:0.8rem 2.5rem;
      border-radius:40px; font-weight:500; font-size:0.95rem; cursor:pointer;
      box-shadow:0 4px 12px rgba(88,166,255,0.25); transition:0.2s;
    }
    .btn-connect:hover { background:#4090e0; }
    .chat-interface { display:flex; flex-direction:column; height:100%; }
    .chat-top {
      display:flex; justify-content:space-between; align-items:center;
      padding:0.9rem 1.2rem; border-bottom:1px solid var(--border); background:var(--surface-elevated);
    }
    .stranger-info { display:flex; align-items:center; gap:0.6rem; font-size:0.9rem; font-weight:500; color:#fff; }
    .online-indicator { width:8px; height:8px; background:#3fb950; border-radius:50%; }
    .btn-report, .btn-disconnect {
      background:transparent; border:1px solid var(--border); color:var(--text-muted);
      padding:0.3rem 1rem; border-radius:20px; font-size:0.8rem; cursor:pointer;
    }
    .btn-report:hover, .btn-disconnect:hover { border-color:#f85149; color:#f85149; }
    .messages {
      flex:1; overflow-y:auto; padding:1.2rem; display:flex;
      flex-direction:column; gap:0.8rem; background:var(--bg);
    }
    .bubble {
      max-width:75%; padding:0.7rem 1rem; border-radius:18px;
      font-size:0.9rem; line-height:1.4; word-wrap:break-word;
    }
    .bubble.stranger { align-self:flex-start; background:var(--surface-elevated); border-bottom-left-radius:6px; }
    .bubble.you { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:6px; }
    .typing-hint { align-self:flex-start; color:var(--text-muted); font-style:italic; font-size:0.8rem; }
    .input-area {
      display:flex; gap:0.6rem; padding:0.9rem 1.2rem;
      border-top:1px solid var(--border); background:var(--surface-elevated); align-items:center;
      position:relative;
    }
    .input-area input {
      flex:1; background:var(--bg); border:1px solid var(--border);
      border-radius:30px; padding:0.65rem 1rem; color:#fff; font-size:0.9rem; outline:none;
    }
    .input-area input:focus { border-color:var(--accent); }
    .btn-emoji {
      background:none; border:none; font-size:1.3rem; cursor:pointer;
      color:var(--text-muted); width:38px; height:38px; display:flex;
      align-items:center; justify-content:center; border-radius:50%;
    }
    .btn-emoji:hover { background:var(--surface-elevated); color:#fff; }
    .btn-send {
      background:var(--accent); border:none; border-radius:50%;
      width:38px; height:38px; color:#fff; font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
    }
    .btn-send:hover { background:#4090e0; }
    .emoji-picker {
      display:none; position:absolute; bottom:70px; right:1.2rem;
      background:var(--surface-elevated); border:1px solid var(--border);
      border-radius:var(--radius); padding:0.8rem; grid-template-columns:repeat(6,1fr);
      gap:0.5rem; box-shadow:0 10px 30px rgba(0,0,0,0.5); z-index:10;
    }
    .emoji-picker.active { display:grid; }
    .emoji-item {
      background:none; border:none; font-size:1.4rem; cursor:pointer;
      padding:0.3rem; border-radius:8px;
    }
    .emoji-item:hover { background:var(--border); }
    .footer { text-align:center; padding:1.5rem; color:var(--text-muted); font-size:0.75rem; border-top:1px solid var(--border); margin-top:auto; }
    @media(max-width:500px) { .container { padding:1rem; } .chat-card { height:450px; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo"><span class="logo-dot"></span>StrangerChat</div>
      <ul class="nav-links"><li><a href="#">Chat</a></li><li><a href="#">Privasi</a></li></ul>
    </div>
  </header>

  <div class="container">
    <div class="ad-slot">Iklan 728×90 — AdSense</div>
    <div class="chat-card" id="chatCard">
      <div class="connect-screen" id="connectScreen">
        <h2>Mulai percakapan acak</h2>
        <p>Klik tombol di bawah untuk terhubung dengan orang asing secara anonim.</p>
        <button class="btn-connect" id="connectBtn">Hubungkan</button>
      </div>
      <div class="chat-interface" id="chatInterface" style="display:none;">
        <div class="chat-top">
          <div class="stranger-info"><span class="online-indicator"></span>Stranger</div>
          <div style="display:flex; gap:0.5rem;">
            <button class="btn-report" id="reportBtn">⚠️ Laporkan</button>
            <button class="btn-disconnect" id="disconnectBtn">Putuskan</button>
          </div>
        </div>
        <div class="messages" id="messageList"></div>
        <div class="input-area">
          <input type="text" id="msgInput" placeholder="Tulis pesan...">
          <button class="btn-emoji" id="emojiBtn">😊</button>
          <button class="btn-send" id="sendBtn">➤</button>
          <div class="emoji-picker" id="emojiPicker">
            <button class="emoji-item">😂</button><button class="emoji-item">❤️</button>
            <button class="emoji-item">😍</button><button class="emoji-item">🤣</button>
            <button class="emoji-item">😊</button><button class="emoji-item">😭</button>
            <button class="emoji-item">😘</button><button class="emoji-item">😅</button>
            <button class="emoji-item">🔥</button><button class="emoji-item">👍</button>
            <button class="emoji-item">🙏</button><button class="emoji-item">💀</button>
          </div>
        </div>
      </div>
    </div>
    <div class="ad-slot" style="margin-top:1.5rem;">Iklan In‑Feed</div>
  </div>
  <footer class="footer">© 2026 StrangerChat · Percakapan aman & anonim</footer>

  <!-- Socket.IO Client dari CDN -->
  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ⚠️ Nanti ganti dengan URL backend kamu (dari Cyclic)
    const SERVER_URL = window.location.origin; // otomatis jika di-hosting bareng
    const socket = io(SERVER_URL);

    const connectScreen = document.getElementById('connectScreen');
    const chatInterface = document.getElementById('chatInterface');
    const messageList = document.getElementById('messageList');
    const msgInput = document.getElementById('msgInput');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const reportBtn = document.getElementById('reportBtn');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPicker = document.getElementById('emojiPicker');
    const sendBtn = document.getElementById('sendBtn');

    let isConnected = false;
    let typingTimeout;

    function playMessageSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }

    function addBubble(text, sender) {
      const div = document.createElement('div');
      div.className = `bubble ${sender}`;
      div.textContent = text;
      messageList.appendChild(div);
      messageList.scrollTop = messageList.scrollHeight;
    }

    function showTyping() {
      if (document.getElementById('typingHint')) return;
      const hint = document.createElement('div');
      hint.className = 'typing-hint';
      hint.id = 'typingHint';
      hint.textContent = 'Stranger mengetik...';
      messageList.appendChild(hint);
      messageList.scrollTop = messageList.scrollHeight;
    }

    function removeTyping() {
      const hint = document.getElementById('typingHint');
      if (hint) hint.remove();
    }

    function showChat() {
      connectScreen.style.display = 'none';
      chatInterface.style.display = 'flex';
      isConnected = true;
      messageList.innerHTML = '';
    }

    function showConnect() {
      chatInterface.style.display = 'none';
      connectScreen.style.display = 'flex';
      isConnected = false;
      messageList.innerHTML = '';
    }

    connectBtn.addEventListener('click', () => {
      socket.emit('find_stranger');
    });

    disconnectBtn.addEventListener('click', () => {
      socket.emit('disconnect');
      showConnect();
    });

    reportBtn.addEventListener('click', () => {
      if (confirm('Laporkan Stranger ini?')) {
        socket.emit('report_user');
        showConnect();
      }
    });

    sendBtn.addEventListener('click', () => {
      const text = msgInput.value.trim();
      if (!text || !isConnected) return;
      addBubble(text, 'you');
      socket.emit('send_message', { text });
      msgInput.value = '';
    });

    msgInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

    msgInput.addEventListener('input', () => {
      if (!isConnected) return;
      socket.emit('typing');
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('stop_typing'), 1000);
    });

    // Emoji picker
    emojiBtn.addEventListener('click', () => emojiPicker.classList.toggle('active'));
    document.addEventListener('click', (e) => {
      if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
        emojiPicker.classList.remove('active');
      }
    });
    document.querySelectorAll('.emoji-item').forEach(btn => {
      btn.addEventListener('click', () => {
        msgInput.value += btn.textContent;
        msgInput.focus();
        emojiPicker.classList.remove('active');
      });
    });

    // Socket events
    socket.on('waiting', (msg) => {});

    socket.on('matched', (roomId) => {
      showChat();
      addBubble('Kamu terhubung dengan stranger! Mulai ngobrol.', 'stranger');
    });

    socket.on('receive_message', (data) => {
      addBubble(data.text, 'stranger');
      playMessageSound();
    });

    socket.on('partner_typing', showTyping);
    socket.on('partner_stop_typing', removeTyping);

    socket.on('stranger_disconnected', () => {
      addBubble('Stranger telah meninggalkan obrolan.', 'stranger');
      setTimeout(showConnect, 2000);
    });

    socket.on('reported', () => {
      addBubble('Kamu telah dilaporkan.', 'stranger');
      setTimeout(showConnect, 2000);
    });
  </script>
</body>
</html>
